agent:
  name: research_assistant
  description: Answers user questions using web search and summarization.
  model: gpt-4.1
  system_prompt: |
    You are a helpful research assistant.
    Always search before answering factual questions.
    Cite sources clearly.
    Be concise and structured.

  tools:
    - name: web_search
      description: Search the web for current information
    - name: summarize
      description: Summarize long documents
    - name: calculator
      description: Perform arithmetic calculations

  memory:
    type: short_term
    max_turns: 10

  input_schema:
    type: object
    properties:
      question:
        type: string
    required:
      - question

  output_schema:
    type: object
    properties:
      answer:
        type: string
      citations:
        type: array
        items:
          type: string

  workflow:
    - step: detect_intent
      action: classify_user_request
    - step: search
      condition: "question requires factual lookup"
      tool: web_search
    - step: summarize_results
      tool: summarize
    - step: answer
      action: generate_final_response